# Optional splash text over wallpapers
splash = false

# Enable or disable IPC (optional)
ipc = on

# Preload images (still allowed but not strictly required in latest versions)
preload = /home/js/documents/wallpapers/bg1.jpg
preload = /home/js/documents/wallpapers/bg2.jpg
preload = /home/js/documents/wallpapers/bg3.jpg
preload = /home/js/documents/wallpapers/bg4.jpg
preload = /home/js/documents/wallpapers/bg5.jpg
preload = /home/js/documents/wallpapers/bg6.jpg
preload = /home/js/documents/wallpapers/bg7.jpg
preload = /home/js/documents/wallpapers/bg8.jpg
preload = /home/js/documents/wallpapers/bg9.jpg
preload = /home/js/documents/wallpapers/bg10.jpg
preload = /home/js/documents/wallpapers/bg11.jpg

# Wallpapers per monitor
wallpaper {
    monitor = eDP-1
    path = /home/js/documents/wallpapers/bg1.jpg
    fit_mode = cover
}

wallpaper {
    monitor = HDMI-A-1
    path = /home/js/documents/wallpapers/bg2.jpg
    fit_mode = cover
}

# Optional fallback (for any monitors without a specific target)
wallpaper {
    monitor =
    path = /home/js/documents/wallpapers/bg3.jpg
    fit_mode = cover
}
